<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClaimCortex Gateway | Secure Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #ffffff 0%, #fcf8f9 50%, #4c0519 100%); }
        .wine-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(76, 5, 25, 0.1); }
    </style>
</head>
<body class="text-slate-900 font-sans min-h-screen flex items-center justify-center p-4 relative">

    <div class="absolute top-5 left-5 text-[100px] font-mono text-rose-950/[0.02] select-none pointer-events-none">∞</div>

    <div class="wine-card p-8 rounded-3xl shadow-2xl w-full max-w-md relative z-10">
        <div class="text-center mb-8">
            <div class="text-rose-900 text-3xl font-mono mb-2">☤</div>
            <h2 class="text-2xl font-black tracking-tight text-rose-950">ClaimCortex <span class="text-rose-700 font-light">Auth</span></h2>
            <p id="portalSubtitle" class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Enterprise Audit Gateway Portal</p>
        </div>

        <div id="tabBar" class="flex gap-4 mb-6 border-b border-rose-950/10 pb-4">
            <button id="toggleLogin" class="flex-1 text-center font-bold text-xs uppercase tracking-wider text-rose-900 border-b-2 border-rose-950 pb-2 outline-none">Log In</button>
            <button id="toggleSignup" class="flex-1 text-center font-bold text-xs uppercase tracking-wider text-slate-400 pb-2 outline-none">Create Account</button>
        </div>

        <form id="authForm" class="space-y-4">
            <div>
                <label id="userLabel" class="block text-[10px] font-bold uppercase tracking-wide text-rose-900 mb-1">Username / Corporate Key</label>
                <input type="text" id="username" required class="w-full bg-white border border-rose-950/10 focus:border-rose-900 text-slate-900 rounded-xl px-4 py-3 text-sm outline-none transition shadow-inner">
            </div>
            <div>
                <label id="passLabel" class="block text-[10px] font-bold uppercase tracking-wide text-rose-900 mb-1">Secure Password</label>
                <input type="password" id="password" required class="w-full bg-white border border-rose-950/10 focus:border-rose-900 text-slate-900 rounded-xl px-4 py-3 text-sm outline-none transition shadow-inner">
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-rose-950 hover:bg-rose-900 text-white font-bold tracking-widest uppercase text-xs py-4 rounded-xl shadow-md transition-all">
                Authenticate Session
            </button>
        </form>

        <div class="text-center mt-6">
            <button id="toggleRecover" class="text-[10px] font-mono text-slate-400 hover:text-rose-900 underline transition尊 outline-none">Forgot Corporate Access Key?</button>
        </div>
    </div>

    <script>
        let mode = 'login'; 
        const toggleLogin = document.getElementById('toggleLogin');
        const toggleSignup = document.getElementById('toggleSignup');
        const toggleRecover = document.getElementById('toggleRecover');
        const submitBtn = document.getElementById('submitBtn');
        const portalSubtitle = document.getElementById('portalSubtitle');
        const userLabel = document.getElementById('userLabel');
        const passLabel = document.getElementById('passLabel');
        const authForm = document.getElementById('authForm');
        const tabBar = document.getElementById('tabBar');

        toggleLogin.addEventListener('click', () => {
            mode = 'login';
            tabBar.classList.remove('hidden');
            portalSubtitle.innerText = "Enterprise Audit Gateway Portal";
            userLabel.innerText = "Username / Corporate Key";
            passLabel.innerText = "Secure Password";
            toggleLogin.className = "flex-1 text-center font-bold text-xs uppercase tracking-wider text-rose-900 border-b-2 border-rose-950 pb-2 outline-none";
            toggleSignup.className = "flex-1 text-center font-bold text-xs uppercase tracking-wider text-slate-400 pb-2 outline-none";
            submitBtn.innerText = "Authenticate Session";
            toggleRecover.innerText = "Forgot Corporate Access Key?";
        });

        toggleSignup.addEventListener('click', () => {
            mode = 'signup';
            tabBar.classList.remove('hidden');
            portalSubtitle.innerText = "Enterprise Audit Gateway Portal";
            userLabel.innerText = "Username / Corporate Key";
            passLabel.innerText = "Secure Password";
            toggleSignup.className = "flex-1 text-center font-bold text-xs uppercase tracking-wider text-rose-900 border-b-2 border-rose-950 pb-2 outline-none";
            toggleLogin.className = "flex-1 text-center font-bold text-xs uppercase tracking-wider text-slate-400 pb-2 outline-none";
            submitBtn.innerText = "Initialize Account Registry";
            toggleRecover.innerText = "Forgot Corporate Access Key?";
        });

        toggleRecover.addEventListener('click', () => {
            if(mode !== 'recover') {
                mode = 'recover';
                tabBar.classList.add('hidden');
                portalSubtitle.innerText = "Credential Reclamation Vault";
                userLabel.innerText = "Confirm Registered Username";
                passLabel.innerText = "Define New Secure Password";
                submitBtn.innerText = "Execute Override Access Recovery";
                toggleRecover.innerText = "Return to Gateway Portal Login";
            } else {
                toggleLogin.click();
            }
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = new FormData();
            data.append('username', document.getElementById('username').value);
            
            let endpoint = '';
            if (mode === 'login') {
                endpoint = 'login';
                data.append('password', document.getElementById('password').value);
            } else if (mode === 'signup') {
                endpoint = 'signup';
                data.append('password', document.getElementById('password').value);
            } else {
                endpoint = 'recover-password';
                data.append('new_password', document.getElementById('password').value);
            }

            try {
                const res = await fetch(`https://claimcortex-ai.onrender.com/api/${endpoint}`, { method: 'POST', body: data });
                const json = await res.json();

                if (!res.ok) {
                    alert(json.detail || 'Authentication execution failure.');
                    return;
                }

                if (mode === 'signup') {
                    alert('Profile securely registered! Switching to Login.');
                    toggleLogin.click();
                    document.getElementById('password').value = '';
                } else if (mode === 'recover') {
                    alert('Credential validation verified. Access password has been updated.');
                    toggleLogin.click();
                    document.getElementById('password').value = '';
                } else {
                    localStorage.setItem('claimcortex_token', json.token);
                    window.location.href = 'dashboard.html';
                }
            } catch {
                alert('ClaimCortex cloud service engine is currently sleeping or offline.');
            }
        });
    </script>
</body>
</html>
